[env:esp32-s3]
platform = espressif32
board = m5stack-cores3
framework = arduino
board_build.arduino.memory_type = qio_opi
board_build.arduino.psram_type = opi
board_build.partitions = partitions_custom.csv
board_upload.flash_size = 8MB

lib_deps = 
    m5stack/M5Unified@^0.1.16
    lvgl/lvgl@^8.3.11
    https://github.com/micro-bitcoin/uBitcoin.git

build_type = release
build_flags = -Os 
    ; Include paths
    -Iinclude
    
    ; LVGL Configuration
    -DLV_CONF_INCLUDE_SIMPLE=1
    -DLV_CONF_SUPPRESS_DEFINE_CHECK=1
    
    ; Security hardening
    -fstack-protector-strong
    -Wstack-usage=4096
    -fwrapv
    -ftrapv
    -D_FORTIFY_SOURCE=2
    
    ; ESP32-S3 specific
    -DCONFIG_IDF_TARGET_ESP32S3=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    
    ; Disable WiFi/BT for air-gap
    -DWIFI_ENABLED=0
    -DBT_ENABLED=0
    
    ; Security features
    -DSECURE_BOOT_ENABLED=1
    -DFLASH_ENCRYPTION_ENABLED=1
    
    ; M5Unified
    -DM5UNIFIED_VERSION_MAJOR=0
    -DM5UNIFIED_VERSION_MINOR=1
    
    ; PSRAM support (8MB OPI on ESP32-S3)
    -DCONFIG_SPIRAM_USE=1
    -DCONFIG_SPIRAM_TYPE_AUTO=1
    -DCONFIG_SPIRAM_SPEED_80M=1
    -DCONFIG_SPIRAM_BOOT_INIT=1
    -DCONFIG_SPIRAM_USE_CAPS_ALLOC=1
    -DCONFIG_SPIRAM_USE_MALLOC=1
    -DBOARD_HAS_PSRAM
    -DCONFIG_MBEDTLS_DYNAMIC_BUFFER=1
    -DCONFIG_MBEDTLS_DYNAMIC_FREE_CONFIG_DATA=1
    -DCONFIG_MBEDTLS_DYNAMIC_CA_CERT_IN_CHAIN=1

upload_port = COMx
monitor_speed = 115200

; Security linker options
build_unflags = 
    -fno-stack-protector
