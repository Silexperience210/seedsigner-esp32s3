[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_qspi
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB

lib_deps = 
    m5stack/M5Unified@^0.1.16
    lvgl/lvgl@^8.3.11
    https://github.com/micro-bitcoin/uBitcoin.git

build_flags = 
    ; Include paths
    -Iinclude
    
    ; LVGL Configuration
    -DLV_CONF_INCLUDE_SIMPLE=1
    -DLV_CONF_SUPPRESS_DEFINE_CHECK=1
    
    ; Security hardening
    -fstack-protector-strong
    -Wstack-usage=4096
    -fwrapv
    -ftrapv
    -D_FORTIFY_SOURCE=2
    
    ; ESP32-S3 specific
    -DCONFIG_IDF_TARGET_ESP32S3=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    
    ; Disable WiFi/BT for air-gap
    -DWIFI_ENABLED=0
    -DBT_ENABLED=0
    
    ; Security features
    -DSECURE_BOOT_ENABLED=1
    -DFLASH_ENCRYPTION_ENABLED=1
    
    ; M5Unified
    -DM5UNIFIED_VERSION_MAJOR=0
    -DM5UNIFIED_VERSION_MINOR=1
    -DM5UNIFIED_VERSION_PATCH=16

upload_port = COMx
monitor_speed = 115200

; Security linker options
build_unflags = 
    -fno-stack-protector
