; SeedSigner ESP32-S3 Edition - PlatformIO Configuration
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = m5stack-cores3
src_dir = src
include_dir = include
lib_dir = lib

; ============================================================
; Common settings for all environments
; ============================================================
[env]
platform = espressif32@6.5.0
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600
board_build.filesystem = littlefs

; Security & Performance flags
build_flags = 
    -Os
    -Wall
    -Werror=return-type
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_ARDUHAL_LOG_DEFAULT_LEVEL=0
    ; LVGL Configuration
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_COMP_CONF_INCLUDE_SIMPLE
    -DLV_HOR_RES_MAX=320
    -DLV_VER_RES_MAX=240
    -DLV_COLOR_DEPTH=16
    ; Bitcoin/Crypto settings
    -DUSE_BIP39_CACHE=0
    -DENABLE_MEMORY_PROTECTION=1

; Library dependencies
lib_deps = 
    ; LVGL for UI
    lvgl/lvgl@^8.4.0
    ; QR Code generation
    ricmoo/QRCode@^0.0.1
    ; QR Code scanning (disabled - quirc not compatible with ESP32)
    ; https://github.com/dlbeer/quirc.git
    ; NFC - Using Seeed-Studio library (more reliable)
    https://github.com/Seeed-Studio/PN532.git
    ; JSON (for PSBT/metadata)
    bblanchon/ArduinoJson@^7.0.0
    ; Crypto (see lib/ for custom secp256k1)
    ; rweather/Crypto@^0.4.0

; ============================================================
; M5Stack CoreS3 (Recommended)
; ============================================================
[env:m5stack-cores3]
board = m5stack-cores3
board_build.partitions = partitions_16MB.csv
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_qspi

build_flags = 
    ${env.build_flags}
    -DM5STACK_CORES3=1
    -DBOARD_HAS_PSRAM
    -DBOARD_HAS_8MB_PSRAM
    ; Display: ILI9342C 320x240
    -DDISPLAY_WIDTH=320
    -DDISPLAY_HEIGHT=240
    -DDISPLAY_DRIVER_ILI9342C=1
    -DDISPLAY_ROTATION=0
    ; Touch: FT6336U
    -DTOUCH_DRIVER_FT6336U=1
    ; Camera: GC0308
    -DCAMERA_MODEL_M5STACK_WIDE=1
    ; Note: CAMERA_GC0308 is defined by esp32-camera SDK, don't redefine here
    ; SD Card
    -DSDCARD_USE_SD=1
    ; NFC PN532 on Grove Port (I2C)
    -DNFC_PN532_I2C=1
    -DNFC_PN532_I2C_ADDRESS=0x24
    ; Disable WiFi/BT by default (security)
    -DWIFI_ENABLED=0
    -DBT_ENABLED=0
    ; Security hardening
    -DENABLE_WATCHDOG=1
    -DMEMORY_CLEAR_ON_BOOT=1
    -DCONFIG_ESP_DEBUG_OCDAWARE=0
    ; Production build
    -DPRODUCTION_BUILD=1
    ; mbedtls configuration
    -DMBEDTLS_CONFIG_FILE="mbedtls/esp_config.h"

lib_deps = 
    ${env.lib_deps}
    ; M5Stack CoreS3 support
    m5stack/M5Unified@^0.1.12
    m5stack/M5GFX@^0.1.14
    ; QR Code library
    ricmoo/QRCode@^0.0.1
    ; Camera driver (built-in with arduino-esp32)

; Build options for CoreS3 (performance optimized)
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio

; Security: Enable secure boot and flash encryption (optional, requires eFuse setup)
; board_build.secure_boot = yes
; board_build.flash_encryption = yes

; ============================================================
; M5Stack CoreS3 with Debug
; ============================================================
[env:m5stack-cores3-debug]
extends = env:m5stack-cores3
build_type = debug
build_flags = 
    ${env:m5stack-cores3.build_flags}
    -DCORE_DEBUG_LEVEL=5
    -DDEBUG_SEEDSIGNER=1
    -O0
monitor_filters = 
    esp32_exception_decoder
    time

; ============================================================
; LilyGo T-Display S3 Pro
; ============================================================
[env:lilygo-tdisplay-s3-pro]
board = esp32-s3-devkitc-1
board_build.partitions = partitions_16MB.csv
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_qspi

build_flags = 
    ${env.build_flags}
    -DLILYGO_TDISPLAY_S3_PRO=1
    -DBOARD_HAS_PSRAM
    -DBOARD_HAS_8MB_PSRAM
    ; Display: ST7796 222x480
    -DDISPLAY_WIDTH=222
    -DDISPLAY_HEIGHT=480
    -DDISPLAY_DRIVER_ST7796=1
    -DDISPLAY_ROTATION=1
    ; Touch: GT911
    -DTOUCH_DRIVER_GT911=1
    ; Camera: OV5640 (external module)
    -DCAMERA_MODEL_TTGO_T_CAMERA_PLUS=1
    -DCAMERA_OV5640=1
    ; SD Card
    -DSDCARD_USE_SD=1
    ; NFC on custom I2C pins
    -DNFC_PN532_I2C=1
    -DNFC_PN532_I2C_ADDRESS=0x24
    -DNFC_SDA=15
    -DNFC_SCL=16
    ; Disable WiFi/BT
    -DWIFI_ENABLED=0
    -DBT_ENABLED=0

lib_deps = 
    ${env.lib_deps}
    ; T-Display S3 specific
    https://github.com/Xinyuan-LilyGO/T-Display-S3.git

; ============================================================
; Native Unit Tests (Host Platform)
; ============================================================
[env:native_test]
platform = native
test_framework = unity
build_flags = 
    -DUNIT_TEST=1
    -DSEEDSIGNER_TEST=1
    -std=c++17

; ============================================================
; Upload options
; ============================================================
[env:upload_ota]
extends = env:m5stack-cores3
upload_protocol = espota
upload_port = seedsigner.local
upload_flags = 
    --auth=${sysenv.OTA_PASSWORD}

; ============================================================
; Serial upload with manual reset
; ============================================================
[env:upload_serial]
extends = env:m5stack-cores3
upload_protocol = esptool
upload_flags = 
    --before=default_reset
    --after=hard_reset
    --chip=esp32s3
