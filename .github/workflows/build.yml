name: Build & Release Firmware

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-cores3:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Cache PlatformIO
      uses: actions/cache@v3
      with:
        path: |
          ~/.platformio/.cache
          ~/.platformio/packages
        key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
    
    - name: Install PlatformIO
      run: |
        pip install platformio
        pio pkg install
    
    - name: Run Tests
      run: pio test -e native_test
    
    - name: Build M5Stack CoreS3 (Production)
      run: |
        pio run -e m5stack-cores3
        mkdir -p release
        cp .pio/build/m5stack-cores3/firmware.bin release/seedsigner-v0.2.0-production.bin
    
    - name: Build M5Stack CoreS3 (Debug)
      run: |
        pio run -e m5stack-cores3-debug
        cp .pio/build/m5stack-cores3-debug/firmware.bin release/seedsigner-v0.2.0-debug.bin
    
    - name: Generate Checksums
      run: |
        cd release
        sha256sum *.bin > checksums.txt
        cat checksums.txt
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: firmware-release
        path: |
          release/*.bin
          release/checksums.txt
    
    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release/*.bin
          release/checksums.txt
        body: |
          ## SeedSigner ESP32-S3 Production Release
          
          ### Security Verified
          - ✅ All 35 tests passing
          - ✅ Security audit completed
          - ✅ Air-gap enforced
          - ✅ JTAG disabled
          
          ### Files
          - `seedsigner-v0.2.0-production.bin` - Production firmware
          - `seedsigner-v0.2.0-debug.bin` - Debug build with tests
          - `checksums.txt` - SHA256 checksums
          
          ### Flashing
          ```bash
          esptool.py --chip esp32s3 --port /dev/ttyUSB0 write_flash 0x0 seedsigner-v0.2.0-production.bin
          ```
          
          See [FLASHING_GUIDE.md](https://github.com/${{ github.repository }}/blob/master/FLASHING_GUIDE.md) for details.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-checks:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
    
    - name: CodeQL Analysis
      uses: github/codeql-action/init@v2
      with:
        languages: cpp
    
    - name: Autobuild
      uses: github/codeql-action/autobuild@v2
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2

  webflasher:
    needs: build-cores3
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Build Artifacts
      uses: actions/download-artifact@v3
      with:
        name: firmware-release
        path: webflasher/
    
    - name: Setup Webflasher Page
      run: |
        mkdir -p webflasher
        cat > webflasher/index.html << 'EOF'
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <title>SeedSigner ESP32-S3 Web Flasher</title>
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <style>
                body {
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                    max-width: 800px;
                    margin: 0 auto;
                    padding: 20px;
                    background: #1a1a1a;
                    color: #fff;
                }
                h1 { color: #F7931A; }
                .warning {
                    background: #cc0000;
                    padding: 15px;
                    border-radius: 8px;
                    margin: 20px 0;
                }
                .button {
                    background: #F7931A;
                    color: #000;
                    padding: 15px 30px;
                    border: none;
                    border-radius: 8px;
                    font-size: 18px;
                    cursor: pointer;
                    margin: 10px;
                }
                .button:hover { background: #ffad42; }
                .info {
                    background: #2a2a2a;
                    padding: 15px;
                    border-radius: 8px;
                    margin: 20px 0;
                }
                code {
                    background: #333;
                    padding: 2px 6px;
                    border-radius: 4px;
                }
            </style>
        </head>
        <body>
            <h1>🔐 SeedSigner ESP32-S3 Web Flasher</h1>
            
            <div class="warning">
                <strong>⚠️ Security Warning:</strong>
                <ul>
                    <li>Only flash firmware from official sources</li>
                    <li>Verify the SHA256 checksum before flashing</li>
                    <li>Use Chrome, Edge, or Opera browser</li>
                </ul>
            </div>
            
            <div class="info">
                <h3>Firmware Version: v0.2.0-production</h3>
                <p>Build Date: ${{ github.event.head_commit.timestamp }}</p>
                <p>Commit: <code>${{ github.sha }}</code></p>
                
                <h4>Checksums (SHA256):</h4>
                <pre id="checksums">Loading...</pre>
            </div>
            
            <div style="text-align: center; margin: 30px 0;">
                <esp-web-install-button
                    manifest="manifest.json">
                    <button slot="activate" class="button">🔧 Flash Production Firmware</button>
                    <span slot="unsupported">Sorry, your browser is not supported. Use Chrome, Edge, or Opera.</span>
                </esp-web-install-button>
            </div>
            
            <div class="info">
                <h3>Instructions</h3>
                <ol>
                    <li>Connect your M5Stack CoreS3 via USB</li>
                    <li>Click the "Flash" button above</li>
                    <li>Select the correct COM port</li>
                    <li>Wait for the flash to complete</li>
                    <li>Device will restart automatically</li>
                </ol>
                
                <h3>Troubleshooting</h3>
                <p>If flash fails, hold <strong>BOOT</strong> button, press <strong>RESET</strong>, release <strong>BOOT</strong>, then try again.</p>
            </div>
            
            <p style="text-align: center; color: #888; margin-top: 40px;">
                <a href="https://github.com/${{ github.repository }}" style="color: #F7931A;">GitHub Repository</a> |
                <a href="https://github.com/${{ github.repository }}/blob/master/FLASHING_GUIDE.md" style="color: #F7931A;">Flashing Guide</a>
            </p>
            
            <script>
                fetch('checksums.txt')
                    .then(r => r.text())
                    .then(text => document.getElementById('checksums').textContent = text);
            </script>
            <script type="module" src="https://unpkg.com/esp-web-tools@9/dist/web/install-button.js?module"></script>
        </body>
        </html>
        EOF
        
        cat > webflasher/manifest.json << 'EOF'
        {
          "name": "SeedSigner ESP32-S3",
          "version": "v0.2.0-production",
          "home_assistant_domain": "seedsigner",
          "new_install_prompt_erase": true,
          "builds": [
            {
              "chipFamily": "ESP32-S3",
              "parts": [
                { "path": "seedsigner-v0.2.0-production.bin", "offset": 0 }
              ]
            }
          ]
        }
        EOF
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./webflasher
        cname: flash.seedsigner-s3.io
