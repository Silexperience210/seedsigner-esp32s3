name: Build & Release Firmware

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build-cores3:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install PlatformIO
      run: |
        pip install platformio
        pio --version
    
    - name: Build Production
      run: |
        pio run -e m5stack-cores3
        ls -la .pio/build/m5stack-cores3/
    
    - name: Build Debug
      run: |
        pio run -e m5stack-cores3-debug
        ls -la .pio/build/m5stack-cores3-debug/
    
    - name: Prepare Release Files
      run: |
        mkdir -p release
        cp .pio/build/m5stack-cores3/firmware.bin release/seedsigner-v0.2.1-production.bin
        cp .pio/build/m5stack-cores3-debug/firmware.bin release/seedsigner-v0.2.1-debug.bin
        ls -la release/
    
    - name: Generate Checksums
      run: |
        cd release
        sha256sum *.bin > checksums.txt
        cat checksums.txt
        cd ..
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-release
        path: release/*
        if-no-files-found: error
    
    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: release/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}