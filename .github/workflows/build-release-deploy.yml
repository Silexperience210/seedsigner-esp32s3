name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install PlatformIO
      run: |
        pip install platformio
        pio platform install espressif32
    
    - name: Build Firmware
      run: pio run
    
    - name: Prepare Web Files
      run: |
        mkdir -p _site
        cp .pio/build/esp32-s3/bootloader.bin _site/bootloader.bin
        cp .pio/build/esp32-s3/partitions.bin _site/partition-table.bin
        cp .pio/build/esp32-s3/firmware.bin _site/seedsigner-esp32s3.bin
        cp web/index.html _site/
        cp web/manifest.json _site/
    
    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
