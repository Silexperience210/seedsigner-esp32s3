name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install PlatformIO
      run: |
        pip install platformio
        pio platform install espressif32
        
    - name: Build Firmware
      run: |
        pio run
        
    - name: Build Filesystem
      run: |
        pio run --target buildfs
        
    - name: Calculate Checksums
      run: |
        cd .pio/build/esp32-s3
        md5sum firmware.bin > firmware.md5
        sha256sum firmware.bin > firmware.sha256
        
    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: firmware
        path: |
          .pio/build/esp32-s3/firmware.bin
          .pio/build/esp32-s3/firmware.md5
          .pio/build/esp32-s3/firmware.sha256
          .pio/build/esp32-s3/bootloader.bin
          .pio/build/esp32-s3/partitions.bin
          
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Download Artifacts
      uses: actions/download-artifact@v3
      with:
        name: firmware
        path: firmware
        
    - name: Create Release Package
      run: |
        mkdir -p release
        cp firmware/firmware.bin release/seedsigner-esp32s3-${GITHUB_REF#refs/tags/}.bin
        cp firmware/bootloader.bin release/bootloader.bin
        cp firmware/partitions.bin release/partition-table.bin
        cp firmware/firmware.md5 release/
        cp firmware/firmware.sha256 release/
        cp web/manifest.json release/
        sed -i "s/PLACEHOLDER_MD5/$(cat firmware/firmware.md5 | cut -d' ' -f1)/" release/manifest.json
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: release/*
        draft: false
        prerelease: false
        generate_release_notes: true
        body: |
          ## SeedSigner ESP32-S3 Firmware ${GITHUB_REF#refs/tags/}
          
          ### Installation
          
          #### Method 1: Web Installer (Recommended)
          Visit: https://silexdev.github.io/seedsigner-esp32s3
          
          #### Method 2: Manual Flash
          ```bash
          esptool.py --chip esp32s3 --port /dev/ttyUSB0 write_flash 0x0 seedsigner-esp32s3-${GITHUB_REF#refs/tags/}.bin
          ```
          
          ### Checksums
          See `firmware.sha256` in release assets.
          
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
  deploy-web:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Download Release Assets
      uses: actions/download-artifact@v3
      with:
        name: firmware
        path: web/firmware
        
    - name: Copy firmware to web
      run: |
        cp web/firmware/firmware.bin web/seedsigner-esp32s3-v1.0.0.bin
        cp web/firmware/bootloader.bin web/bootloader.bin
        cp web/firmware/partitions.bin web/partition-table.bin
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./web
        force_orphan: true
